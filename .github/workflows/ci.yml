name: CI/CD Pipeline - Docker Build & Push

on:
  push:
    branches: [ "main" ]  # main 브랜치에 코드가 푸시되었을 때 작동
  pull_request:
    branches: [ "main" ]

env:
  # 내 Docker Hub 사용자명과 생성될 이미지 이름으로 설정
  # PR을 날리거나 푸시할 때 사용할 이미지 이름 지정 
  IMAGE_NAME: ${{ github.repository_owner }}/phishing-shield

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # PR이 아닐 때만 Docker Hub 로그인 (실제 push를 위해)
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # Docker 이미지에 부여할 태그(tag)와 라벨 추출
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=sha,format=short

      # 빌드 속도 향상을 위해 GitHub Actions 캐싱 기능(gha) 활용
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
